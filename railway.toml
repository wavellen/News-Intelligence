# NewsIntel Railway configuration — API service ONLY
#
# This file configures the news-intel-api service.
# The frontend service uses frontend/railway.toml — set Root Directory to
# "frontend" in the Railway frontend service settings.
#
# Setup:
#   1. API service:
#      - Root Directory: (leave blank / repo root)
#      - Set env vars in Railway UI:
#          DATABASE_URL  = ${{news-intel-db.DATABASE_URL}}
#          SECRET_KEY    = <python -c "import secrets; print(secrets.token_hex(32))">
#          ALLOWED_ORIGINS = https://your-frontend.up.railway.app
#
#   2. Frontend service:
#      - Root Directory: frontend
#      - Railway will auto-read frontend/railway.toml and frontend/Dockerfile
#      - Set env var: NEWSINTEL_API_URL = https://your-api.up.railway.app
#
# IMPORTANT — DATABASE_URL must be the Railway internal reference variable.
# If it resolves to an empty string the app will warn and fall back to SQLite.
# Check that the DB service is properly linked in Railway's service settings.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[build]
  builder = "NIXPACKS"
  # Nixpacks reads .python-version → 3.11.9 automatically.
  # spaCy download must use --user so the model is in the user package path.
  buildCommand = "pip install --prefer-binary -r requirements.txt && python -m spacy download en_core_web_sm --user"

[deploy]
  # Run migrations before starting the server on every deploy.
  # This ensures the users table (005), bias_confidence column (003),
  # and query indexes (004) all exist before app code runs.
  # Railway does not have a separate release_command, so we chain with &&.
  startCommand       = "alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
  healthcheckPath    = "/health"
  healthcheckTimeout = 60       # allow spaCy model load time
  restartPolicyType  = "ON_FAILURE"
  restartPolicyMaxRetries = 3

# Non-secret environment variables.
# DATABASE_URL, SECRET_KEY, ALLOWED_ORIGINS must be set as Railway service variables.
# IMPORTANT: Set DATABASE_URL = ${{news-intel-db.DATABASE_URL}} — NOT a Supabase URL.
[variables]
  ENV                           = "production"
  DEBUG                         = "false"
  PYTHONUNBUFFERED              = "1"
  AUTH_MODE                     = "required"
  ACCESS_TOKEN_EXPIRE_MINUTES   = "30"
  REFRESH_TOKEN_EXPIRE_DAYS     = "7"
  FETCH_INTERVAL_MINUTES        = "60"
  MAX_ARTICLES_PER_SOURCE       = "50"
  STOCK_UPDATE_INTERVAL_MINUTES = "15"
  RATE_LIMIT_DEFAULT            = "60"
  RATE_LIMIT_EXPENSIVE          = "20"
  RATE_LIMIT_ADMIN              = "10"
  RATE_LIMIT_STOCKS             = "30"
  CACHE_TTL_SUMMARY             = "60"
  CACHE_TTL_TOPICS              = "120"
  CACHE_TTL_ARTICLES            = "30"
  CACHE_TTL_TRENDING            = "90"
  CACHE_TTL_STOCKS              = "60"

