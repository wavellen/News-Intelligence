# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# NewsIntel — Frontend service Railway config
#
# In Railway, set this service's "Root Directory" to:  frontend
# Railway will then read THIS file instead of the root railway.toml, so the
# frontend service won't inherit the API's alembic+uvicorn startCommand.
#
# Required environment variable for this service:
#   NEWSINTEL_API_URL = https://your-api-service.up.railway.app
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

[build]
  builder = "STATIC"
  buildCommand = "echo 'Static frontend — no build needed'"

[deploy]
  startCommand    = "npx serve -s . -l $PORT"
  healthcheckPath = "/"
  healthcheckTimeout = 15
  restartPolicyType  = "ON_FAILURE"
  restartPolicyMaxRetries = 3
