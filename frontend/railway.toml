[build]
  builder = "NIXPACKS"
  buildCommand = "npm install"

[deploy]
  startCommand = "npm start"
  healthcheckPath = "/"
  healthcheckTimeout = 15
  restartPolicyType = "ON_FAILURE"
  restartPolicyMaxRetries = 3
